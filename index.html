<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PibbleStore</title>
  <script>
    // Aplica el tema guardado antes de pintar la interfaz para evitar parpadeos.
    const savedTheme = localStorage.getItem('pibblestore-theme') || 'dark';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="border-bottom">
    <div class="container py-3">
      <div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center">
        <div class="d-flex align-items-center gap-3">
          <img src="media/logo.png" alt="Logo PibbleStore" style="height: 45px; width: auto; object-fit: contain;">
          <div>
            <h1 class="h3 mb-0">PibbleStore</h1>
            <p class="mb-0 text-body-secondary d-none d-sm-block">Hardware para gamers, creadores y builders.</p>
          </div>
        </div>

        <nav class="ps-nav d-flex flex-wrap gap-2 align-items-center" aria-label="Navegación principal">
          <button type="button" class="btn btn-primary" data-view="catalogo">
            Catálogo
          </button>
          <button type="button" class="btn btn-outline-primary position-relative cart-btn" data-view="carrito">
            Carrito
            <span id="cart-count-badge"
              class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle d-none">0</span>
          </button>
          <button type="button" class="btn btn-outline-secondary btn-soft-secondary" id="theme-toggle-btn"
            aria-pressed="true">
            Modo oscuro
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="catalogo-view" class="py-4" aria-labelledby="catalogo-title">
      <div class="mb-3">
        <h2 id="catalogo-title" class="h4 mb-1">Catálogo de Productos</h2>
        <p class="text-body-secondary mb-0">Selecciona componentes para agregarlos al carrito.</p>
      </div>

      <div id="products-container" class="row g-3" aria-live="polite"></div>
    </section>

    <section id="carrito-view" class="py-4 d-none" aria-labelledby="carrito-title">
      <div class="mb-3">
        <h2 id="carrito-title" class="h4 mb-1">Carrito de Compras</h2>
        <p class="text-body-secondary mb-0">Revisa tus productos, cantidades y el total de tu compra.</p>
      </div>

      <div id="cart-container"></div>

      <div class="d-flex justify-content-end mt-3">
        <button type="button" id="clear-cart-btn" class="btn btn-danger btn-soft-danger">
          <i class="bi bi-trash3 action-icon"></i>Vaciar Carrito
        </button>
      </div>
    </section>
  </main>

  <footer class="border-top mt-4">
    <div class="container py-3">
      <p class="mb-0 text-body-secondary">PibbleStore - E-commerce de hardware.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>

  <audio id="bg-music" loop>
  <source src="media/audio/music.mpeg" type="audio/mpeg">
  Tu navegador no soporta el elemento de audio.
</audio>
</body>

</html>
